<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club de Atletismo Team Running</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{background:#16213e;border-bottom:3px solid #d4a017;padding:14px 16px;display:flex;align-items:center;gap:12px}
header img{height:52px;width:52px;object-fit:contain;border-radius:8px}
header h1{font-size:1rem;font-weight:700;color:#fff;line-height:1.3}
header p{font-size:.72rem;color:#a0aec0}
.nav{display:flex;gap:6px;padding:12px 16px;flex-wrap:wrap;background:#0f1117}
.nav button{padding:9px 16px;border-radius:8px;border:1px solid #2d3748;background:#1a1f2e;color:#a0aec0;cursor:pointer;font-size:.85rem}
.nav button.active{background:#e53e3e;border-color:#e53e3e;color:#fff;font-weight:600}
.wrap{padding:0 16px 40px}
.panel{display:none}.panel.active{display:block}
.card{background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:16px;margin-bottom:14px}
.card h2{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
@media(max-width:480px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
label{font-size:.78rem;color:#a0aec0;display:block;margin-bottom:3px}
input,select{width:100%;padding:10px;border-radius:7px;border:1px solid #2d3748;background:#0f1117;color:#e2e8f0;font-size:.9rem;outline:none}
input:focus,select:focus{border-color:#e53e3e}
.btnr{background:#e53e3e;color:#fff;border:none;padding:11px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;flex:1}
.btnp{background:#2c5282;color:#fff;border:none;padding:11px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600}
.btng{background:#2d3748;color:#e2e8f0;border:none;padding:11px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;flex:1}
.brow{display:flex;gap:8px;margin-top:12px}
.msg{margin-top:8px;font-size:.85rem}
.ath-item{background:#16213e;border:1px solid #2d3748;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.ath-item:hover{border-color:#e53e3e}
.ath-header{display:flex;justify-content:space-between;align-items:flex-start}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:600px){.sg{grid-template-columns:repeat(5,1fr)}}
.sb{background:#16213e;border:1px solid #2d3748;border-radius:8px;padding:10px;text-align:center}
.sb .v{font-size:1rem;font-weight:700;color:#fff}
.sb .l{font-size:.7rem;color:#a0aec0;margin-top:2px}
.sb.g .v{color:#48bb78}.sb.r .v{color:#fc8181}.sb.y .v{color:#f6ad55}
.dp{color:#48bb78;font-weight:700}.dn{color:#fc8181;font-weight:700}
.cw{height:240px;position:relative;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:7px 9px;color:#a0aec0;border-bottom:1px solid #2d3748;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid #1e2535;vertical-align:middle}
.tw{overflow-x:auto}
.bg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.72rem;font-weight:600}
.bg.test{background:#1a365d;color:#90cdf4;border:1px solid #3182ce}
.bg.entrenamiento{background:#1c4532;color:#9ae6b4;border:1px solid #38a169}
.bg.competencia{background:#3d2c00;color:#fbd38d;border:1px solid #d69e2e}
.cat-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:700;background:#2c5282;color:#90cdf4;border:1px solid #3182ce}
.imc-normal{color:#48bb78}.imc-bajo{color:#90cdf4}.imc-sobre{color:#f6ad55}.imc-obesidad{color:#fc8181}
.empty{text-align:center;padding:28px;color:#4a5568}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(min-width:600px){.fr{grid-template-columns:repeat(3,1fr)}}
.bdel{background:none;border:1px solid #fc8181;color:#fc8181;padding:4px 9px;border-radius:5px;cursor:pointer;font-size:.78rem}
.iabtn{background:linear-gradient(135deg,#1a365d,#2c5282);color:#fff;border:2px solid #d4a017;border-radius:8px;padding:9px 16px;font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:10px}
.iabtn:disabled{opacity:.5;cursor:not-allowed}
.iabox{background:#0f1a2e;border:1px solid #d4a017;border-radius:10px;padding:16px;font-size:.88rem;color:#e2e8f0;line-height:1.7}
.ia-titulo{color:#d4a017;font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;margin-top:12px;margin-bottom:3px}
.ia-titulo:first-child{margin-top:0}
.ia-texto{color:#e2e8f0;margin-bottom:4px}
.ia-bien{display:inline-block;background:#1c4532;color:#68d391;border-radius:4px;padding:1px 6px;font-size:.72rem;margin-right:4px}
.ia-mal{display:inline-block;background:#3d0a0a;color:#fc8181;border-radius:4px;padding:1px 6px;font-size:.72rem;margin-right:4px}
#conn{position:fixed;top:0;right:0;padding:3px 8px;font-size:.68rem;z-index:999;border-radius:0 0 0 6px}
.badge-unidad{display:inline-block;background:#2c5282;color:#90cdf4;border-radius:6px;padding:3px 10px;font-size:.75rem;font-weight:600;margin-left:8px;vertical-align:middle}
.perfil-box{background:#0f1117;border:1px solid #2d3748;border-radius:10px;padding:14px;margin-top:10px}
.perfil-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
@media(min-width:500px){.perfil-stats{grid-template-columns:repeat(4,1fr)}}
.hist-med{font-size:.78rem;color:#a0aec0;margin-top:8px}
.hist-med table th{font-size:.72rem}
.hist-med table td{font-size:.78rem}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#1a1f2e;border:1px solid #2d3748;border-radius:14px;padding:20px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1rem;font-weight:700;color:#fff;margin-bottom:14px}
.modal-close{float:right;background:none;border:none;color:#a0aec0;font-size:1.2rem;cursor:pointer;margin-top:-4px}
</style>
</head>

<script>

var RS=[],DEPS=[],PRUS=[],PERFILES={},CHT=null,IARS=[],tabActual=0,DB=null,atletaActivo='';

var PRUEBAS_CAMPO=['Salto largo','Salto triple','Salto alto','Salto con pertiga','Lanzamiento de disco','Lanzamiento de bala','Lanzamiento de martillo','Lanzamiento de jabalina','Disco','Bala','Martillo','Jabalina','Pertiga'];

function esPruebaCampo(n){
  if(!n)return false;
  var nl=n.toLowerCase();
  if(nl.indexOf('lanzamiento')>=0||nl.indexOf('salto')>=0||nl.indexOf('bala')>=0||nl.indexOf('disco')>=0||nl.indexOf('martillo')>=0||nl.indexOf('jabalina')>=0||nl.indexOf('pertiga')>=0)return true;
  return false;
}

function actualizarUnidad(){
  var p=document.getElementById('r-pnv').value.trim()||document.getElementById('r-pru').value;
  var ec=esPruebaCampo(p);
  document.getElementById('bloque-tiempo').style.display=ec?'none':'block';
  document.getElementById('bloque-distancia').style.display=ec?'block':'none';
}

function formatValor(v,ec){return ec?v.toFixed(2)+' m':toStr(v);}

// ---- CATEGORIA POR EDAD ----
function calcularEdad(fnac){
  if(!fnac)return null;
  var hoy=new Date(),nac=new Date(fnac);
  var edad=hoy.getFullYear()-nac.getFullYear();
  var m=hoy.getMonth()-nac.getMonth();
  if(m<0||(m===0&&hoy.getDate()<nac.getDate()))edad--;
  return edad;
}

// Categoria oficial World Athletics por anio de nacimiento
// Cada categoria cubre 2 anios (U23 cubre 3). Ej en 2026:
// U10: 2017-2018 | U12: 2015-2016 | U14: 2013-2014 | U16: 2011-2012
// U18: 2009-2010 | U20: 2007-2008 | U23: 2004-2005-2006 | Mayores: 2003 y antes
function categoriaAtletica(fnac){
  if(!fnac)return '';
  var anioNac=new Date(fnac).getFullYear();
  var temporada=new Date().getFullYear();
  var diff=temporada-anioNac;
  if(diff<=9)return 'U10';
  if(diff<=11)return 'U12';
  if(diff<=13)return 'U14';
  if(diff<=15)return 'U16';
  if(diff<=17)return 'U18';
  if(diff<=19)return 'U20';
  if(diff<=22)return 'U23';
  return 'Mayores';
}

  var fnac=document.getElementById('mp-fnac').value;

  document.getElementById('mp-cat').value=cat+(edad!==null?' ('+edad+' anos)':'');
}

// ---- IMC ----
function calcularIMC(){
  var est=parseFloat(document.getElementById('mp-est').value);
  var pes=parseFloat(document.getElementById('mp-pes').value);
  var box=document.getElementById('mp-imc-resultado');
  if(!est||!pes||est<50||pes<10){box.style.display='none';return;}
  var imc=pes/((est/100)*(est/100));
  var val=imc.toFixed(1);
  var cat,desc,cls;
  if(imc<16){cat='Delgadez severa';desc='IMC muy por debajo del rango saludable';cls='imc-bajo';}
  else if(imc<18.5){cat='Bajo peso';desc='Por debajo del rango saludable';cls='imc-bajo';}
  else if(imc<25){cat='Peso normal';desc='Rango saludable';cls='imc-normal';}
  else if(imc<30){cat='Sobrepeso';desc='Por encima del rango saludable';cls='imc-sobre';}
  else{cat='Obesidad';desc='Muy por encima del rango saludable';cls='imc-obesidad';}
  document.getElementById('mp-imc-val').textContent=val;
  document.getElementById('mp-imc-val').className=cls;
  document.getElementById('mp-imc-cat').textContent=cat;
  document.getElementById('mp-imc-cat').className=cls;
  document.getElementById('mp-imc-desc').textContent=desc;
  box.style.display='block';
}

function iaAnalisis(){
  if(!IARS.length)return;
  var btn=document.getElementById('iabtn'),out=document.getElementById('iaout');
  btn.disabled=true;btn.textContent='Generando...';
  out.innerHTML='<div style="color:#9f7aea;padding:10px">Calculando...</div>';

  try {
    var rs=IARS,dep=rs[0].deportista,pru=rs[0].prueba;
    var unidad=getUnidad(rs[0]),ec=unidad==='metros';
    var vals=rs.map(function(r){return getValor(r);});

    // Validar que todos los valores son numeros validos
    for(var i=0;i<vals.length;i++){
      if(isNaN(vals[i])||vals[i]<=0){
        out.innerHTML='<div class="iabox" style="border-color:#e53e3e;color:#fc8181">No se puede generar el informe: uno o mas registros tienen un valor invalido. Revisa el historial.</div>';
        btn.disabled=false;btn.textContent='Generar informe del entrenador';
        return;
      }
    }

    var mejor=ec?Math.max.apply(null,vals):Math.min.apply(null,vals);
    var peor=ec?Math.min.apply(null,vals):Math.max.apply(null,vals);
    var suma=0;for(var i=0;i<vals.length;i++)suma+=vals[i];var prom=suma/vals.length;
    var mejoraTotal=ec?(vals[vals.length-1]-vals[0]):(vals[0]-vals[vals.length-1]);
    var pctMejora=vals[0]>0?((Math.abs(mejoraTotal)/vals[0])*100).toFixed(1):'0';
    var mejoras=0,retrocesos=0;
    for(var i=1;i<vals.length;i++){
      var esM=ec?(vals[i]>vals[i-1]):(vals[i]<vals[i-1]);
      if(esM)mejoras++;else if(ec?(vals[i]<vals[i-1]):(vals[i]>vals[i-1]))retrocesos++;
    }
    var consistencia=vals.length>1?Math.round((mejoras/(vals.length-1))*100):0;
    var rachaMax=0,rachaActual=0;
    for(var i=1;i<vals.length;i++){
      var esM2=ec?(vals[i]>vals[i-1]):(vals[i]<vals[i-1]);
      if(esM2){rachaActual++;if(rachaActual>rachaMax)rachaMax=rachaActual;}else rachaActual=0;
    }
    var variabilidad=Math.abs(peor-mejor);
    var varPct=prom>0?((variabilidad/prom)*100).toFixed(1):'0';
    var nTest=0,nEnt=0,nComp=0;
    for(var i=0;i<rs.length;i++){
      if(rs[i].tipo==='test')nTest++;

      var pend=(vals[vals.length-1]-vals[0])/(vals.length-1);

    // Datos del perfil del atleta

    // Perfil fisico si existe
    if(imcAtl||edad!==null){
      h+='<div class="ia-titulo">Perfil del atleta</div>';

      if(edad!==null)linf+='Edad: <b>'+edad+' anos</b>   ';

      if(imcAtl){

        else linf+='<br><span class="ia-bien">IMC en rango saludable.</span>';
      }
      h+='<div class="ia-texto">'+linf+'</div>';
    }

    // Resumen general
    h+='<div class="ia-titulo">Resumen general</div>';
    if(mejoraTotal>0){
      h+='<div class="ia-texto">'+dep+' ha mostrado una <b>mejora solida</b> en '+pru+'. ';
      if(ec)h+='Ha aumentado su marca en <b>'+mejoraTotal.toFixed(2)+' m</b> ('+pctMejora+'%).';
      else h+='Ha bajado <b>'+toStr(mejoraTotal)+'</b> ('+pctMejora+'%).';
      if(consistencia>=70)h+=' El '+consistencia+'% de las sesiones mostraron mejora. <b>Progresion muy consistente.</b></div>';
      else if(consistencia>=50)h+=' El '+consistencia+'% de las sesiones mostraron mejora. Hay avance con altibajos normales.</div>';
      else h+=' Solo el '+consistencia+'% de sesiones con mejora. Tendencia positiva pero irregular.</div>';
    } else if(mejoraTotal<0){
      h+='<div class="ia-texto"><span class="ia-mal">Tendencia negativa.</span> ';
      if(ec)h+='La distancia disminuyo '+Math.abs(mejoraTotal).toFixed(2)+' m ('+pctMejora+'%). Revisar planificacion y recuperacion.</div>';
      else h+='El tiempo aumento '+toStr(Math.abs(mejoraTotal))+' ('+pctMejora+'%). Revisar planificacion y recuperacion.</div>';
    } else {
      h+='<div class="ia-texto">Rendimiento <b>estable</b>. Sin mejora ni retroceso claro. Momento de introducir nuevos estimulos.</div>';
    }

    // Mejor marca
    h+='<div class="ia-titulo">Mejor marca</div>';
    var idxMejor=vals.indexOf(mejor);
    if(idxMejor>=0&&mejor===vals[vals.length-1]){
      h+='<div class="ia-texto">La mejor marca es <b>'+formatValor(mejor,ec)+'</b>, alcanzada en la <b>ultima sesion</b>. El atleta esta en su mejor momento. Aprovechar este momentum.</div>';
    } else if(idxMejor>=0){
      var difMB=Math.abs(vals[vals.length-1]-mejor);
      h+='<div class="ia-texto">Mejor marca: <b>'+formatValor(mejor,ec)+'</b> ('+rs[idxMejor].fecha+'). Ultimo registro: '+formatValor(vals[vals.length-1],ec)+'. Diferencia: <b>'+formatValor(difMB,ec)+'</b>. Objetivo: recuperar y superar esa marca.</div>';
    }

    // Consistencia
    h+='<div class="ia-titulo">Consistencia</div>';
    if(parseFloat(varPct)<3)h+='<div class="ia-texto"><span class="ia-bien">Muy consistente.</span> Variacion de solo '+formatValor(variabilidad,ec)+' entre sesiones.</div>';
    else if(parseFloat(varPct)<8)h+='<div class="ia-texto"><span class="ia-bien">Aceptable.</span> Variacion de '+formatValor(variabilidad,ec)+'. Normal en proceso de mejora activa.</div>';
    else h+='<div class="ia-texto"><span class="ia-mal">Irregular.</span> Variacion de '+formatValor(variabilidad,ec)+'. Revisar descanso, alimentacion y carga entre sesiones.</div>';

    // Sesiones
    h+='<div class="ia-titulo">Sesiones registradas</div>';
    var sesArr=[];

    // Areas de trabajo
    h+='<div class="ia-titulo">Areas de trabajo para seguir mejorando</div>';
    var pn=pru.toLowerCase();

    var esSalt=pn.indexOf('salto')>=0||pn.indexOf('pertiga')>=0;
    var esVall=pn.indexOf('valla')>=0||pn.indexOf('obstaculo')>=0;
    var esFondo=pn.indexOf('1500')>=0||pn.indexOf('3000')>=0||pn.indexOf('5000')>=0||pn.indexOf('10000')>=0||pn.indexOf('marato')>=0;
    var esVel=(pn.indexOf('100m')>=0||pn.indexOf('200m')>=0)&&!esFondo;
    var esMed=pn.indexOf('800')>=0||pn.indexOf('600')>=0||pn.indexOf('400')>=0;

    if(esLanz){
      h+='<div class="ia-texto"><b>1. Fuerza maxima:</b> Base de todos los lanzamientos. Sentadilla, press, peso muerto, arranque olimpico.</div>';
      h+='<div class="ia-texto"><b>2. Potencia explosiva:</b> Aplicar la fuerza rapido. Saltos con carga, lanzamientos de balon medicinal.</div>';
      h+='<div class="ia-texto"><b>3. Tecnica del lanzamiento:</b> Grabar en video para analizar el giro, posicion y punto de suelta.</div>';
      h+='<div class="ia-texto"><b>4. Implementos de diferente peso:</b> Alternar con pesos distintos para desarrollar fuerza y velocidad especifica.</div>';
      h+='<div class="ia-texto"><b>5. Movilidad:</b> Hombros, cadera, munecas. La amplitud del movimiento impacta directamente en la distancia.</div>';
      h+='<div class="ia-texto"><b>6. Calidad sobre cantidad:</b> 3-5 min de descanso entre series. 6 lanzamientos al 100% valen mas que 20 al 70%.</div>';
    } else if(esSalt){
      h+='<div class="ia-texto"><b>1. Fuerza en tren inferior:</b> Sentadillas, lunges, prensa. La fuerza de piernas es la base del salto.</div>';
      h+='<div class="ia-texto"><b>2. Pliometria:</b> Saltos al cajon, multisaltos. Desarrollan potencia explosiva en el impulso.</div>';
      h+='<div class="ia-texto"><b>3. Carrera de aproximacion:</b> La velocidad de llegada a la batida determina gran parte del resultado.</div>';
      h+='<div class="ia-texto"><b>4. Accion de batida:</b> Rigidez, accion de brazos y rodilla libre. Trabajar ejercicios especificos de batida.</div>';
      h+='<div class="ia-texto"><b>5. Tecnica de vuelo y caida:</b> Posicion correcta en el aire para maximizar la distancia o la altura.</div>';
      h+='<div class="ia-texto"><b>6. Velocidad de aproximacion:</b> A mas velocidad, mayor potencial. Trabajo de velocidad 1-2 veces por semana.</div>';
    } else if(esVall){
      h+='<div class="ia-texto"><b>1. Tecnica de paso:</b> Ataque, arrastre y posicion del tronco. Trabajar a baja velocidad para fijar la mecanica.</div>';
      h+='<div class="ia-texto"><b>2. Ritmo entre vallas:</b> Constancia en el numero de pasos. Repetir hasta que sea automatico.</div>';
      h+='<div class="ia-texto"><b>3. Velocidad de base:</b> Sin velocidad no hay buen resultado en vallas. Trabajo de velocidad pura en rectas.</div>';
      h+='<div class="ia-texto"><b>4. Flexibilidad de cadera:</b> Estiramientos diarios de flexores, isquiotibiales y aductores.</div>';
      h+='<div class="ia-texto"><b>5. Salida y primeras vallas:</b> Las primeras 3-4 vallas pueden definir la carrera. Repeticion especifica.</div>';
      h+='<div class="ia-texto"><b>6. Resistencia especifica:</b> Mantener la tecnica cuando llega el cansancio en los ultimos metros.</div>';
    } else if(esFondo){
      h+='<div class="ia-texto"><b>1. Volumen aerobico:</b> Rodajes largos y suaves (zona 2) de 45-70 min, 3-4 veces por semana. El motor primero.</div>';
      h+='<div class="ia-texto"><b>2. Trabajo de umbral:</b> 20-30 min a ritmo de competencia. Sube el umbral lactato y permite sostener mas velocidad.</div>';
      h+='<div class="ia-texto"><b>3. Series largas:</b> 4-6x1000m o 2000m al ritmo objetivo con 90 seg de trote de recuperacion.</div>';
      h+='<div class="ia-texto"><b>4. Fartlek:</b> Cambios de ritmo dentro del rodaje. Mejora la respuesta ante aceleraciones en carrera.</div>';
      h+='<div class="ia-texto"><b>5. Economia de carrera:</b> Postura, zancada y cadencia (170-180 pasos/min). Menos energia al mismo ritmo.</div>';
      h+='<div class="ia-texto"><b>6. Fuerza especifica:</b> Core y tren inferior 2 veces por semana. Previene lesiones y mejora la eficiencia.</div>';
    } else if(esVel){
      h+='<div class="ia-texto"><b>1. Fuerza y potencia:</b> Sentadillas, peso muerto, saltos con carga. 2 sesiones de fuerza por semana.</div>';
      h+='<div class="ia-texto"><b>2. Salidas:</b> Series de 20-30m enfocadas en la reaccion y aceleracion inicial.</div>';
      h+='<div class="ia-texto"><b>3. Series al 95-100%:</b> 60-80m con recuperacion completa (4-5 min). Calidad total siempre.</div>';
      h+='<div class="ia-texto"><b>4. Tecnica:</b> Postura, rodillas altas, brazos en 90 grados, contacto breve con el suelo.</div>';
      h+='<div class="ia-texto"><b>5. Pliometria:</b> Multisaltos y saltos al cajon. Mejoran la reactividad de cada zancada.</div>';
      h+='<div class="ia-texto"><b>6. Flexibilidad:</b> Flexores de cadera e isquiotibiales. La amplitud de la zancada es clave.</div>';
    } else if(esMed){
      h+='<div class="ia-texto"><b>1. Base aerobica:</b> El 50% del rendimiento viene del sistema aerobico. Rodajes de 30-45 min, 3 veces por semana.</div>';
      h+='<div class="ia-texto"><b>2. Series de 300-400m:</b> A ritmo mas rapido que el objetivo. Ej: 6x400m con 90 seg de recuperacion.</div>';
      h+='<div class="ia-texto"><b>3. Ritmo especifico:</b> Series de 200m al ritmo objetivo. Acostumbrar al cuerpo a ese esfuerzo.</div>';
      h+='<div class="ia-texto"><b>4. Velocidad:</b> 1-2 sesiones semanales de 60-100m. El sprint final puede definir la carrera.</div>';
      h+='<div class="ia-texto"><b>5. Tolerancia al lactato:</b> Mantener la velocidad cuando llega el cansancio en los ultimos metros.</div>';
      h+='<div class="ia-texto"><b>6. Fuerza de tren inferior:</b> Sentadillas y lunges. Mejora la economia y el sprint final.</div>';
    } else {
      h+='<div class="ia-texto"><b>1. Base aerobica:</b> Rodajes continuos a ritmo comodo para construir el motor.</div>';
      h+='<div class="ia-texto"><b>2. Series especificas:</b> Repeticiones a ritmo de competencia con recuperacion adecuada.</div>';
      h+='<div class="ia-texto"><b>3. Fuerza:</b> Tren inferior y core. Mejora la economia y reduce lesiones.</div>';
      h+='<div class="ia-texto"><b>4. Tecnica:</b> Ejercicios especificos de la prueba. Mas velocidad con menos esfuerzo.</div>';
      h+='<div class="ia-texto"><b>5. Pliometria:</b> Multisaltos y ejercicios explosivos para mejorar la potencia.</div>';
      h+='<div class="ia-texto"><b>6. Movilidad:</b> Trabajo diario de flexibilidad articular. Prevencion de lesiones.</div>';
    }

    h+='<div class="ia-texto"><b>7. Recuperacion:</b> Dormir 8 horas, hidratacion adecuada y al menos un dia completo de descanso por semana.</div>';
    h+='<div class="ia-texto"><b>8. Periodizacion:</b> Semanas de carga alta alternadas con semanas de descarga cada 3-4 semanas.</div>';

    if(proyeccion&&mejoraTotal>0){
      h+='<div class="ia-titulo">Proyeccion</div>';
      h+='<div class="ia-texto">Si mantiene la tendencia, el resultado estimado para las proximas 3 sesiones seria <b>'+proyeccion+'</b>.</div>';
    }

    h+='<div class="ia-titulo">Conclusion del entrenador</div>';
    if(mejoraTotal>0&&consistencia>=60)h+='<div class="ia-texto">'+dep+' esta en una muy buena trayectoria. Los numeros confirman que el trabajo esta funcionando. No conformarse y buscar el siguiente nivel con trabajo inteligente y constante. <b>Sigue asi.</b></div>';
    else if(mejoraTotal>0)h+='<div class="ia-texto">'+dep+' va mejorando aunque no de forma completamente lineal. Eso es normal. La tendencia apunta hacia arriba. Con mas regularidad los resultados seran mas solidos.</div>';
    else if(mejoraTotal<0)h+='<div class="ia-texto">Momento de reflexion y ajuste. El retroceso no define al atleta, define la necesidad de revisar el plan. Los retrocesos temporales son parte del proceso de cualquier atleta de alto nivel.</div>';
    else h+='<div class="ia-texto">Rendimiento estable indica buena base. Para romper el estancamiento se necesita un nuevo estimulo: mas intensidad, mas volumen o trabajo tecnico diferente.</div>';

    h+='<div style="margin-top:14px;padding-top:10px;border-top:1px solid #2d3748;font-size:.72rem;color:#4a5568">Club de Atletismo Team Running &mdash; Informe generado automaticamente &mdash; '+rs.length+' registros analizados</div>';
    h+='</div>';

    out.innerHTML=h;

  } catch(err) {
    out.innerHTML='<div class="iabox" style="border-color:#e53e3e;color:#fc8181">Error al generar el informe: '+err.message+'<br>Asegurate de seleccionar un deportista y una prueba especifica.</div>';
    console.error('iaAnalisis error:', err);
  }

  btn.disabled=false;btn.textContent='Regenerar informe';
}

function mostrarHistorial(){
  var df=document.getElementById('h-dep').value,pf=document.getElementById('h-pru').value,tf=document.getElementById('h-tip').value;
  var rs=[];for(var i=0;i<RS.length;i++){var r=RS[i];if((!df||r.deportista===df)&&(!pf||r.prueba===pf)&&(!tf||r.tipo===tf))rs.push(r);}
  rs.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var c=document.getElementById('tbl-hist');
  if(!rs.length){c.innerHTML='<div class="empty">No hay resultados.</div>';return;}
  var rows='';
  for(var i=0;i<rs.length;i++){var r=rs[i],val=getValor(r),ec=getUnidad(r)==='metros';rows+='<tr><td>'+r.fecha+'</td><td><b>'+r.deportista+'</b></td><td>'+r.prueba+'</td><td><span class="bg '+r.tipo+'">'+r.tipo+'</span></td><td><b>'+formatValor(val,ec)+'</b></td><td style="color:#a0aec0">'+(r.lugar||'-')+'</td><td style="color:#718096;font-size:.78rem">'+(r.notas||'-')+'</td><td><button class="bdel" data-fid="'+r.fid+'">Eliminar</button></td></tr>';}
  c.innerHTML='<div class="tw"><table><thead><tr><th>Fecha</th><th>Atleta</th><th>Prueba</th><th>Tipo</th><th>Resultado</th><th>Lugar</th><th>Notas</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  var btns=c.querySelectorAll('.bdel');for(var i=0;i<btns.length;i++){btns[i].addEventListener('click',function(){eliminar(this.getAttribute('data-fid'));});}
}

function eliminar(fid){if(!confirm('Eliminar este registro?'))return;if(!DB){alert('Sin conexion.');return;}DB.collection('resultados').doc(fid).delete().catch(function(e){alert('Error: '+e.message);});}

function exportarExcel(){
  if(!RS.length){alert('No hay datos para exportar.');return;}

  var filas1=[['CLUB DE ATLETISMO TEAM RUNNING - Resultados'],[''],
    ['Fecha','Deportista','Categoria','Prueba','Tipo','Resultado','Unidad','Lugar','Notas']
  ];
  var rsOrdenados=RS.slice().sort(function(a,b){return a.deportista.localeCompare(b.deportista)||a.fecha.localeCompare(b.fecha);});
  for(var i=0;i<rsOrdenados.length;i++){
    var r=rsOrdenados[i];
    var perfil=PERFILES[r.deportista]||{};
    var cat=categoriaAtletica(perfil.fnac)||'Sin categoria';
    var ec=getUnidad(r)==='metros';
    var val=getValor(r);
    var resultado=ec?val.toFixed(2):toStr(val);
    var unidad=ec?'metros':'tiempo (m:ss.cc)';
    filas1.push([r.fecha,r.deportista,cat,r.prueba,r.tipo,resultado,unidad,r.lugar||'',r.notas||'']);
  }

  var filas2=[['CLUB DE ATLETISMO TEAM RUNNING - Perfiles Atletas'],[''],
    ['Atleta','Fecha Nacimiento','Edad','Categoria','Estatura (cm)','Peso (kg)','IMC','Clasificacion IMC','Pruebas']
  ];
  var deps=[];
  for(var i=0;i<RS.length;i++){if(deps.indexOf(RS[i].deportista)<0)deps.push(RS[i].deportista);}
  for(var d in PERFILES){if(deps.indexOf(d)<0)deps.push(d);}
  deps.sort();
  for(var i=0;i<deps.length;i++){
    var dep=deps[i];
    var p=PERFILES[dep]||{};
    var edad=calcularEdad(p.fnac);
    var cat2=categoriaAtletica(p.fnac)||'Sin categoria';
    var imc=p.estatura&&p.peso?(p.peso/((p.estatura/100)*(p.estatura/100))).toFixed(1):'';
    var imcCat='';
    if(imc){var imcN=parseFloat(imc);imcCat=imcN<16?'Delgadez severa':imcN<18.5?'Bajo peso':imcN<25?'Peso normal':imcN<30?'Sobrepeso':'Obesidad';}
    var pruebas=[];
    for(var j=0;j<RS.length;j++){if(RS[j].deportista===dep&&pruebas.indexOf(RS[j].prueba)<0)pruebas.push(RS[j].prueba);}
    filas2.push([dep,p.fnac||'',edad!==null?edad:'',cat2,p.estatura||'',p.peso||'',imc,imcCat,pruebas.join(', ')]);
  }

  var filas3=[['CLUB DE ATLETISMO TEAM RUNNING - Resumen por Atleta y Prueba'],[''],
    ['Atleta','Categoria','Prueba','Registros','Mejor','Peor','Promedio','Mejora total','% Mejora','Tendencia']
  ];
  var grupos={};
  for(var i=0;i<RS.length;i++){
    var r2=RS[i];
    var k=r2.deportista+'||'+r2.prueba;
    if(!grupos[k])grupos[k]=[];
    grupos[k].push(r2);
  }
  var claves=Object.keys(grupos).sort();
  for(var i=0;i<claves.length;i++){
    var grp=grupos[claves[i]];
    grp.sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
    var dep2=grp[0].deportista,pru2=grp[0].prueba;
    var perfil3=PERFILES[dep2]||{};
    var cat3=categoriaAtletica(perfil3.fnac)||'Sin categoria';
    var ec3=getUnidad(grp[0])==='metros';
    var vals=grp.map(function(r){return getValor(r);});
    var mejor=ec3?Math.max.apply(null,vals):Math.min.apply(null,vals);
    var peor=ec3?Math.min.apply(null,vals):Math.max.apply(null,vals);
    var suma=0;for(var j=0;j<vals.length;j++)suma+=vals[j];var prom=suma/vals.length;
    var mejT=ec3?(vals[vals.length-1]-vals[0]):(vals[0]-vals[vals.length-1]);
    var pctM=vals[0]>0?((Math.abs(mejT)/vals[0])*100).toFixed(1):'0';
    var tend=mejT>0?'Mejora':mejT<0?'Retroceso':'Estable';
    filas3.push([dep2,cat3,pru2,grp.length,
      ec3?mejor.toFixed(2)+' m':toStr(mejor),
      ec3?peor.toFixed(2)+' m':toStr(peor),
      ec3?prom.toFixed(2)+' m':toStr(prom),
      ec3?(mejT>=0?'+':'')+mejT.toFixed(2)+' m':(mejT>=0?'-':'+')+toStr(Math.abs(mejT)),
      pctM+'%',tend]);
  }

  function csvHoja(filas){
    var lines=[];
    for(var i=0;i<filas.length;i++){
      var cols=filas[i].map(function(c){
        var s=String(c===null||c===undefined?'':c);
        if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('
')>=0)s='"'+s.replace(/"/g,'""')+'"';
        return s;
      });
      lines.push(cols.join(','));
    }
    return lines.join('
');
  }

  var contenido='﻿';
  contenido+=csvHoja(filas1)+'


';
  contenido+=csvHoja(filas2)+'


';
  contenido+=csvHoja(filas3);

  var blob=new Blob([contenido],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var fechaHoy=new Date().toISOString().split('T')[0];

// ============ EXPORTAR EXCEL ============
function exportarExcel(){
  if(!RS.length){alert('No hay datos para exportar.');return;}

  // Hoja 1: Resultados
  var filas1=[['CLUB DE ATLETISMO TEAM RUNNING - Resultados'],[''],
    ['Fecha','Deportista','Categoria','Prueba','Tipo','Resultado','Unidad','Lugar','Notas']
  ];
  var rsOrdenados=RS.slice().sort(function(a,b){return a.deportista.localeCompare(b.deportista)||a.fecha.localeCompare(b.fecha);});
  for(var i=0;i<rsOrdenados.length;i++){
    var r=rsOrdenados[i];
    var perfil=PERFILES[r.deportista]||{};
    var cat=categoriaAtletica(perfil.fnac)||'Sin categoria';
    var ec=getUnidad(r)==='metros';
    var val=getValor(r);
    var resultado=ec?val.toFixed(2):toStr(val);
    var unidad=ec?'metros':'tiempo (m:ss.cc)';
    filas1.push([r.fecha,r.deportista,cat,r.prueba,r.tipo,resultado,unidad,r.lugar||'',r.notas||'']);
  }

  // Hoja 2: Perfiles atletas
  var filas2=[['CLUB DE ATLETISMO TEAM RUNNING - Perfiles Atletas'],[''],
    ['Atleta','Fecha Nacimiento','Edad','Categoria','Estatura (cm)','Peso (kg)','IMC','Clasificacion IMC','Pruebas']
  ];
  var deps=[];
  for(var i=0;i<RS.length;i++){if(deps.indexOf(RS[i].deportista)<0)deps.push(RS[i].deportista);}
  for(var d in PERFILES){if(deps.indexOf(d)<0)deps.push(d);}
  deps.sort();
  for(var i=0;i<deps.length;i++){
    var dep=deps[i];
    var p=PERFILES[dep]||{};
    var edad=calcularEdad(p.fnac);
    var cat2=categoriaAtletica(p.fnac)||'Sin categoria';
    var imc=p.estatura&&p.peso?(p.peso/((p.estatura/100)*(p.estatura/100))).toFixed(1):'';
    var imcCat='';
    if(imc){var imcN=parseFloat(imc);imcCat=imcN<16?'Delgadez severa':imcN<18.5?'Bajo peso':imcN<25?'Peso normal':imcN<30?'Sobrepeso':'Obesidad';}
    var pruebas=[];
    for(var j=0;j<RS.length;j++){if(RS[j].deportista===dep&&pruebas.indexOf(RS[j].prueba)<0)pruebas.push(RS[j].prueba);}
    filas2.push([dep,p.fnac||'',edad!==null?edad:'',cat2,p.estatura||'',p.peso||'',imc,imcCat,pruebas.join(', ')]);
  }

  // Hoja 3: Resumen por atleta y prueba
  var filas3=[['CLUB DE ATLETISMO TEAM RUNNING - Resumen por Atleta y Prueba'],[''],
    ['Atleta','Categoria','Prueba','Registros','Mejor marca','Peor marca','Promedio','Mejora total','% Mejora','Tendencia']
  ];
  // Agrupar por atleta+prueba
  var grupos={};
  for(var i=0;i<RS.length;i++){
    var r=RS[i];
    var k=r.deportista+'||'+r.prueba;
    if(!grupos[k])grupos[k]=[];
    grupos[k].push(r);
  }
  var claves=Object.keys(grupos).sort();
  for(var i=0;i<claves.length;i++){
    var k=claves[i],grp=grupos[k];
    grp.sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
    var dep=grp[0].deportista,pru=grp[0].prueba;
    var perfil2=PERFILES[dep]||{};
    var cat3=categoriaAtletica(perfil2.fnac)||'Sin categoria';
    var ec2=getUnidad(grp[0])==='metros';
    var vals=grp.map(function(r){return getValor(r);});
    var mejor=ec2?Math.max.apply(null,vals):Math.min.apply(null,vals);
    var peor=ec2?Math.min.apply(null,vals):Math.max.apply(null,vals);
    var suma=0;for(var j=0;j<vals.length;j++)suma+=vals[j];var prom=suma/vals.length;
    var mejT=ec2?(vals[vals.length-1]-vals[0]):(vals[0]-vals[vals.length-1]);
    var pctM=vals[0]>0?((Math.abs(mejT)/vals[0])*100).toFixed(1):'0';
    var tend=mejT>0?'Mejora':mejT<0?'Retroceso':'Estable';
    var unidStr=ec2?'m':'m:ss.cc';
    filas3.push([dep,cat3,pru,grp.length,
      ec2?mejor.toFixed(2)+' m':toStr(mejor),
      ec2?peor.toFixed(2)+' m':toStr(peor),
      ec2?prom.toFixed(2)+' m':toStr(prom),
      ec2?(mejT>=0?'+':'')+mejT.toFixed(2)+' m':(mejT>=0?'-':'+')+toStr(Math.abs(mejT)),
      pctM+'%',tend]);
  }

  // Construir CSV multi-hoja simulado con separadores claros
  // Como no tenemos libreria xlsx, usamos CSV con BOM para Excel
  function csvHoja(titulo, filas){
    var lines=[];
    for(var i=0;i<filas.length;i++){
      var cols=filas[i].map(function(c){
        var s=String(c===null||c===undefined?'':c);
        if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('
')>=0)s='"'+s.replace(/"/g,'""')+'"';
        return s;
      });
      lines.push(cols.join(','));
    }
    return lines.join('
');
  }

  // Crear 3 archivos CSV separados en un ZIP simulado
  // En realidad creamos un solo CSV con las 3 hojas separadas por lineas en blanco
  var contenido='﻿'; // BOM para UTF-8
  contenido+=csvHoja('Resultados',filas1);
  contenido+='


';
  contenido+=csvHoja('Perfiles',filas2);
  contenido+='


';
  contenido+=csvHoja('Resumen',filas3);

  var blob=new Blob([contenido],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var fecha=new Date().toISOString().split('T')[0];
  a.href=url;
  a.download='TeamRunning_'+fecha+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Mostrar confirmacion
  var btn=document.getElementById('btnExportar');
  var textoOriginal=btn.textContent;
  btn.textContent='Descargado!';
  btn.style.background='linear-gradient(135deg,#1c4532,#276749)';
  setTimeout(function(){btn.textContent=textoOriginal;},2000);
}
